<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1072, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>Kindle Dashboard Fix</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #ffffff; 
            color: #000000; 
            font-family: sans-serif; 
            width: 1072px; 
            height: 1448px; 
            overflow: hidden; 
            position: relative;
        }
        
        .container { width: 100%; height: 100%; padding: 40px; padding-top: 100px; }
        
        .top-bar { width: 100%; display: block; overflow: hidden; margin-bottom: 60px; }
        
        /* 调整 line-height 为 1.0 防止大字顶部被切，同步微调两侧的 padding-top 确保底部对齐 */
        #ym { float: left; width: 33.3333%; font-size: 38px; font-weight: bold; text-align: left; padding-top: 110px; }
        .clock { float: left; width: 33.3333%; font-size: 160px; font-weight: bold; text-align: center; line-height: 1.0; }
        .weather-info { float: left; width: 33.3333%; font-size: 32px; font-weight: bold; text-align: right; padding-top: 116px; }

        .quote-box { width: 100%; border: 4px solid #000000; padding: 30px; margin-bottom: 40px; }
        .content-title { font-size: 42px; font-weight: bold; margin-bottom: 15px; }
        #dailySub { font-size: 40px; line-height: 1.5; color: #000000; font-weight: normal; }

        .calendar-section { width: 100%; margin-top: 60px; }
        table { border-collapse: separate; border-spacing: 12px; width: 100%; table-layout: fixed; }
        th { font-size: 24px; color: #666666; text-align: center; padding-bottom: 15px; }
        
        td { text-align: center; font-size: 38px; border-radius: 12px; height: 110px; vertical-align: middle; background: transparent; color: #000000; }
        
        /* 强化 Kindle 兼容性样式 */
        .today { background: #000000 !important; color: #ffffff !important; font-weight: bold; }
        .other-month { color: #aaaaaa !important; }

        .btns { position: absolute; bottom: 150px; right: 40px; }
        .btn { border: 4px solid #000000; background: #ffffff; padding: 15px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div id="ym">加载中...</div>
        <div class="clock" id="time">00:00</div>
        <div class="weather-info" id="weather">上海 · 16°C</div>
    </div>

    <div class="quote-box">
        <div class="content-title" id="dailyTitle">菲茨定律</div>
        <div id="dailySub">目标越大、距离越近，越容易操作。</div>
    </div>

    <div class="calendar-section">
        <table>
            <thead><tr id="weekHead"></tr></thead>
            <tbody id="calBody"></tbody>
        </table>
    </div>
</div>

<div class="btns">
    <button class="btn" onclick="toggleLang()" id="langBtn">EN</button>
</div>

<script>
    var isEn = false;
    function pad(n) { return n < 10 ? '0' + n : n; }

    function getFixedDate() {
        var d = new Date();
        var offset = d.getTimezoneOffset(); 
        var utc = d.getTime() + (offset * 60000); 
        var beijingTime = utc + (3600000 * 8); 
        return new Date(beijingTime);
    }

    function refresh() {
        var now = getFixedDate();
        document.getElementById('time').innerHTML = pad(now.getHours()) + ":" + pad(now.getMinutes());
        
        var y = now.getFullYear();
        var mon = now.getMonth();
        var d = now.getDate();

        document.getElementById('ym').innerHTML = isEn ? (y + "." + pad(mon + 1) + "." + pad(d)) : (y + "年" + (mon + 1) + "月" + d + "日");

        var lang = {
            zh: { w: "上海 · 16°C", weeks: ['日','一','二','三','四','五','六'], b: "EN", t: "菲茨定律", s: "目标越大、距离越近，越容易操作。" },
            en: { w: "Shanghai · 16°C", weeks: ['S','M','T','W','T','F','S'], b: "CN", t: "Fitts's Law", s: "The time to acquire a target is a function of distance and size." }
        };
        var cur = isEn ? lang.en : lang.zh;
        
        document.getElementById('weather').innerHTML = cur.w;
        document.getElementById('langBtn').innerHTML = cur.b;
        document.getElementById('dailyTitle').innerHTML = cur.t;
        document.getElementById('dailySub').innerHTML = cur.s;

        var weekHtml = "";
        for (var i = 0; i < cur.weeks.length; i++) weekHtml += "<th>" + cur.weeks[i] + "</th>";
        document.getElementById('weekHead').innerHTML = weekHtml;

        var body = document.getElementById('calBody');
        body.innerHTML = "";
        
        var firstDay = new Date(y, mon, 1).getDay();
        var lastDate = new Date(y, mon + 1, 0).getDate();
        var prevLast = new Date(y, mon, 0).getDate();

        var days = [];
        for (var a = firstDay - 1; a >= 0; a--) days.push({ v: prevLast - a, t: 'o' });
        for (var b = 1; b <= lastDate; b++) days.push({ v: b, t: 'c' });
        while (days.length < 35) days.push({ v: days.length - (lastDate + firstDay - 1) + 1, t: 'o' });

        var html = "";
        for (var row = 0; row < 5; row++) {
            html += "<tr>";
            for (var col = 0; col < 7; col++) {
                var item = days[row * 7 + col];
                var className = "";
                if (item.t === 'c' && item.v === d) {
                    className = "today";
                } else if (item.t === 'o') {
                    className = "other-month";
                }
                html += "<td class='" + className + "'>" + Math.abs(item.v) + "</td>";
            }
            html += "</tr>";
        }
        body.innerHTML = html;
    }

    function toggleLang() { isEn = !isEn; refresh(); }
    refresh();
    setInterval(refresh, 30000);
</script>
</body>
</html>
