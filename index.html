<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1072, user-scalable=no">
    <title>Kindle PW3 Calendar</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --sub: #666666; --line: #000000; --cal-other: #d0d0d0; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --sub: #999999; --line: #ffffff; --cal-other: #404040; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, "Source Han Sans", sans-serif; 
            width: 1072px; 
            height: 1448px; 
            overflow: hidden; 
        }

        .container { 
            display: flex; 
            flex-direction: column; /* 垂直排版更适合 PW3 的原生渲染 */
            width: 100%; 
            height: 100%; 
            padding: 40px;
            /* 关键：向下偏移以避开地址栏 */
            margin-top: 100px; 
        }

        /* 顶部时间与天气区 */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 6px solid var(--line); padding-bottom: 20px; }
        .clock { font-size: 160px; font-weight: 800; line-height: 1; }
        .weather-info { text-align: right; font-size: 32px; font-weight: 600; line-height: 1.5; }

        /* 中间日历区 */
        .calendar-section { margin-bottom: 50px; }
        .date-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
        #ym { font-size: 48px; font-weight: 900; }
        #lunar { font-size: 28px; color: var(--sub); }

        table { border-collapse: separate; border-spacing: 12px; width: 100%; table-layout: fixed; }
        th { font-size: 24px; color: var(--sub); text-align: center; font-weight: normal; padding-bottom: 15px; }
        td { text-align: center; font-size: 38px; border-radius: 12px; height: 110px; vertical-align: middle; border: 4px solid transparent; }
        
        .today { background: var(--text); color: var(--bg); font-weight: bold; }
        .selected { border: 4px solid var(--text); font-weight: bold; }
        .other-month { color: var(--cal-other); }

        /* 底部内容区 */
        .bottom-content { border-top: 3px dashed var(--sub); padding-top: 40px; flex: 1; }
        .content-title { font-size: 52px; font-weight: 900; margin-bottom: 20px; }
        #dailySub { font-size: 30px; line-height: 1.6; color: var(--text); }

        /* 控制按钮 */
        .btns { position: absolute; bottom: 150px; right: 40px; display: flex; gap: 20px; }
        .btn { border: 3px solid var(--text); background: var(--bg); color: var(--text); padding: 15px 30px; border-radius: 10px; font-size: 24px; font-weight: 900; }
    </style>
</head>
<body data-theme="light">
<div class="container">
    <div class="top-bar">
        <div class="clock" id="time">00:00</div>
        <div class="weather-info">
            <div id="weather">上海 · 晴 · 16°C</div>
            <div id="lunar">丙午马年 · 正月初一</div>
        </div>
    </div>

    <div class="calendar-section">
        <div class="date-header">
            <div id="ym">2026年4月</div>
        </div>
        <table>
            <thead><tr id="weekHead"></tr></thead>
            <tbody id="calBody"></tbody>
        </table>
    </div>

    <div class="bottom-content">
        <div class="content-title" id="dailyTitle">菲茨定律</div>
        <div id="dailySub">目标越大、距离越近，越容易操作。边缘区域具有“无限宽度”，是极佳的交互触点。</div>
    </div>
</div>

<div class="btns">
    <button class="btn" onclick="toggleLang()" id="langBtn">EN</button>
    <button class="btn" onclick="toggleTheme()" id="themeBtn">DARK</button>
</div>

<script>
    /* 脚本部分保留你的逻辑，但针对 PW3 性能优化了渲染频率 */
    let isEn = false;
    let selDate = new Date();

    function refresh() {
        const now = new Date();
        document.getElementById('time').innerText = now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0');
        const opt = { year: 'numeric', month: isEn ? 'short' : 'long', day: 'numeric' };
        document.getElementById('ym').innerText = selDate.toLocaleDateString(isEn ? 'en-US' : 'zh-CN', opt);
        
        // 天气与周表文字切换
        const lang = {
            zh: { weather: "上海 · 晴 · 16°C", weeks: ['日','一','二','三','四','五','六'], title: "菲茨定律", btn: "EN" },
            en: { weather: "Shanghai · Sunny", weeks: ['S','M','T','W','T','F','S'], title: "Fitts's Law", btn: "CN" }
        };
        const cur = isEn ? lang.en : lang.zh;
        document.getElementById('weather').innerText = cur.weather;
        document.getElementById('weekHead').innerHTML = cur.weeks.map(w => `<th>${w}</th>`).join('');
        document.getElementById('langBtn').innerText = cur.btn;
        renderCal();
    }

    function renderCal() {
        const body = document.getElementById('calBody');
        body.innerHTML = "";
        const y = selDate.getFullYear(), m = selDate.getMonth();
        const start = new Date(y, m, 1).getDay();
        const count = new Date(y, m + 1, 0).getDate();
        const prevCount = new Date(y, m, 0).getDate();

        let days = [];
        for(let i = start - 1; i >= 0; i--) days.push({ d: prevCount - i, type: 'other' });
        for(let i = 1; i <= count; i++) days.push({ d: i, type: 'curr' });
        while(days.length < 35) days.push({ d: days.length - (count + start - 1), type: 'other' });
        
        for(let i=0; i < 5; i++) {
            let tr = document.createElement('tr');
            for(let j=0; j<7; j++) {
                let item = days[i*7 + j];
                let td = document.createElement('td');
                td.innerText = Math.abs(item.d);
                if(item.type === 'curr') {
                    const today = new Date();
                    if(item.d === today.getDate() && m === today.getMonth() && y === today.getFullYear()) td.classList.add('today');
                    if(item.d === selDate.getDate()) td.classList.add('selected');
                } else { td.classList.add('other-month'); }
                tr.appendChild(td);
            }
            body.appendChild(tr);
        }
    }

    function toggleLang() { isEn = !isEn; refresh(); }
    function toggleTheme() {
        const isD = document.body.getAttribute('data-theme') === 'dark';
        document.body.setAttribute('data-theme', isD ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isD ? 'DARK' : 'LIGHT';
    }

    refresh();
    // 墨水屏不需要秒级刷新，改为每分钟刷新一次减少耗电
    setInterval(refresh, 60000);
</script>
</body>
</html>
