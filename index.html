<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1072, user-scalable=no">
    <title>Kindle PW3 Calendar Fix</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --sub: #666666; --line: #000000; --cal-other: #d0d0d0; }
        [data-theme="dark"] { --bg: #000000; --text: #ffffff; --sub: #999999; --line: #ffffff; --cal-other: #404040; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; width: 1072px; height: 1448px; overflow: hidden; position: relative; }

        .container { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 40px; margin-top: 100px; }
        .top-bar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; border-bottom: 6px solid var(--line); padding-bottom: 20px; width: 100%; }
        .clock { font-size: 160px; font-weight: bold; line-height: 1; }
        .weather-info { text-align: right; font-size: 32px; font-weight: bold; line-height: 1.5; }

        .calendar-section { margin-bottom: 50px; }
        .date-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 20px; }
        #ym { font-size: 48px; font-weight: bold; }
        #lunar { font-size: 28px; color: var(--sub); }

        table { border-collapse: separate; border-spacing: 12px; width: 100%; table-layout: fixed; }
        th { font-size: 24px; color: var(--sub); text-align: center; padding-bottom: 15px; }
        td { text-align: center; font-size: 38px; border-radius: 12px; height: 110px; vertical-align: middle; border: 4px solid transparent; }
        
        .today { background: var(--text); color: var(--bg); font-weight: bold; }
        .selected { border: 4px solid var(--text); }
        .other-month { color: var(--cal-other); }

        .bottom-content { border-top: 3px dashed var(--sub); padding-top: 40px; flex: 1; }
        .content-title { font-size: 52px; font-weight: bold; margin-bottom: 20px; }
        #dailySub { font-size: 30px; line-height: 1.6; }

        .btns { position: absolute; bottom: 150px; right: 40px; display: flex; }
        .btn { border: 4px solid var(--text); background: var(--bg); color: var(--text); padding: 15px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; margin-left: 20px; }
    </style>
</head>
<body data-theme="light">
<div class="container">
    <div class="top-bar">
        <div class="clock" id="time">00:00</div>
        <div class="weather-info">
            <div id="weather">上海 · 晴 · 16°C</div>
            <div id="lunar-text">丙午马年</div>
        </div>
    </div>
    <div class="calendar-section">
        <div class="date-header">
            <div id="ym">加载中...</div>
            <div id="lunar"></div>
        </div>
        <table>
            <thead><tr id="weekHead"></tr></thead>
            <tbody id="calBody"></tbody>
        </table>
    </div>
    <div class="bottom-content">
        <div class="content-title" id="dailyTitle">菲茨定律</div>
        <div id="dailySub">目标越大、距离越近，越容易操作。边缘区域具有“无限宽度”，是极佳的交互触点。</div>
    </div>
</div>
<div class="btns">
    <button class="btn" onclick="toggleLang()" id="langBtn">EN</button>
    <button class="btn" onclick="toggleTheme()" id="themeBtn">DARK</button>
</div>

<script>
    // 使用 ES3/ES5 基础语法以兼容 Kindle 浏览器
    var isEn = false;
    var selDate = new Date();

    function pad(n) { return n < 10 ? '0' + n : n; }

    function refresh() {
        var now = new Date();
        document.getElementById('time').innerHTML = pad(now.getHours()) + ":" + pad(now.getMinutes());
        
        var year = selDate.getFullYear();
        var month = selDate.getMonth();
        var date = selDate.getDate();

        // 兼容性日期显示
        var monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        var monthNamesEn = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        var displayYM = isEn ? (monthNamesEn[month] + " " + year) : (year + "年" + monthNames[month]);
        document.getElementById('ym').innerHTML = displayYM;

        var langData = {
            zh: { weather: "上海 · 晴 · 16°C", weeks: ['日','一','二','三','四','五','六'], btn: "EN" },
            en: { weather: "Shanghai · Sunny", weeks: ['S','M','T','W','T','F','S'], btn: "CN" }
        };
        var cur = isEn ? langData.en : langData.zh;
        
        document.getElementById('weather').innerHTML = cur.weather;
        document.getElementById('langBtn').innerHTML = cur.btn;

        // 渲染周表头
        var weekHtml = "";
        for (var i = 0; i < cur.weeks.length; i++) {
            weekHtml += "<th>" + cur.weeks[i] + "</th>";
        }
        document.getElementById('weekHead').innerHTML = weekHtml;

        renderCal(year, month, date);
    }

    function renderCal(y, m, d) {
        var body = document.getElementById('calBody');
        body.innerHTML = "";
        
        var firstDay = new Date(y, m, 1).getDay();
        var lastDate = new Date(y, m + 1, 0).getDate();
        var prevLastDate = new Date(y, m, 0).getDate();

        var days = [];
        // 上个月余天
        for (var i = firstDay - 1; i >= 0; i--) {
            days.push({ val: prevLastDate - i, type: 'other' });
        }
        // 本月
        for (var j = 1; j <= lastDate; j++) {
            days.push({ val: j, type: 'curr' });
        }
        // 下个月补位
        var nextFill = 35 - days.length;
        if (nextFill < 0) nextFill = 42 - days.length;
        for (var k = 1; k <= nextFill; k++) {
            days.push({ val: k, type: 'other' });
        }

        var today = new Date();
        var html = "";
        for (var row = 0; row < days.length / 7; row++) {
            html += "<tr>";
            for (var col = 0; col < 7; col++) {
                var item = days[row * 7 + col];
                var cls = "";
                if (item.type === 'other') {
                    cls = "other-month";
                } else {
                    if (item.val === today.getDate() && m === today.getMonth() && y === today.getFullYear()) cls = "today";
                    else if (item.val === d) cls = "selected";
                }
                html += "<td class='" + cls + "'>" + item.val + "</td>";
            }
            html += "</tr>";
        }
        body.innerHTML = html;
    }

    function toggleLang() { isEn = !isEn; refresh(); }
    function toggleTheme() {
        var body = document.body;
        var isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerHTML = isDark ? 'DARK' : 'LIGHT';
    }

    // 初始化调用
    refresh();
    // 每一分钟更新一次时间
    setInterval(refresh, 60000);
</script>
</body>
</html>
