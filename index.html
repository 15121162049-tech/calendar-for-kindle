<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1072, user-scalable=no, initial-scale=1.0, maximum-scale=1.0">
    <title>Kindle Design Dashboard</title>
    <style>
        /* 1. 极端强制隐藏所有滚动条 */
        ::-webkit-scrollbar { display: none !important; width: 0 !important; height: 0 !important; }
        
        html, body {
            margin: 0;
            padding: 0;
            width: 1072px;
            height: 1448px;
            overflow: hidden !important; /* 核心：禁止溢出 */
            background: #ffffff;
            color: #000000;
            font-family: sans-serif;
            -ms-content-zooming: none;
            touch-action: none; /* 禁止现代内核的触摸行为 */
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        
        .container { 
            width: 1072px; 
            height: 1448px; 
            padding: 40px; 
            padding-top: 40px;
            position: absolute;
            top: 0;
            left: 0;
        }
        
        .top-bar { width: 100%; display: block; overflow: hidden; margin-bottom: 40px; }
        
        #ym { float: left; width: 33.3333%; font-size: 38px; font-weight: bold; text-align: left; padding-top: 110px; }
        .clock { float: left; width: 33.3333%; font-size: 160px; font-weight: bold; text-align: center; line-height: 1.0; }
        .weather-info { float: left; width: 33.3333%; font-size: 32px; font-weight: bold; text-align: right; padding-top: 116px; }

        /* 2. 文案框：严格固定高度，绝不允许溢出 */
        .quote-box { 
            width: 100%; 
            border: 4px solid #000000; 
            margin-bottom: 40px; 
            position: relative; 
            height: 200px; 
            overflow: hidden !important; 
        }

        .quote-content {
            width: 100%;
            height: 100%;
            padding: 30px 40px;
            overflow: hidden !important;
        }
        
        .content-title { font-size: 40px; font-weight: bold; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #dailySub { font-size: 40px; line-height: 1.4; color: #000000; font-weight: normal; display: block; }

        .calendar-section { width: 100%; margin-top: 40px; }
        table { border-collapse: separate; border-spacing: 12px; width: 100%; table-layout: fixed; }
        th { font-size: 24px; color: #666666; text-align: center; padding-bottom: 15px; }
        
        td { text-align: center; font-size: 38px; border-radius: 12px; height: 110px; vertical-align: middle; background: transparent; color: #000000; }
        
        .today { background: #000000 !important; color: #ffffff !important; font-weight: bold; }
        .other-month { color: #aaaaaa !important; }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div id="ym">加载中...</div>
        <div class="clock" id="time">00:00</div>
        <div class="weather-info" id="weather">上海 · 16°C</div>
    </div>

    <div class="quote-box">
        <div class="quote-content">
            <div class="content-title" id="dailyTitle">--</div>
            <div id="dailySub">--</div>
        </div>
    </div>

    <div class="calendar-section">
        <table>
            <thead>
                <tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr>
            </thead>
            <tbody id="calBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 3. 从 JavaScript 层面禁止触摸滚动行为
    document.addEventListener('touchmove', function(e) {
        e.preventDefault();
    }, { passive: false });

    var dataList = [
        ["美学可用性效应", "好看的界面，用户会主观觉得更好用。"],
        ["选择过载", "选项越多，人越难决策、越容易放弃。"],
        ["分块 (Chunking)", "信息拆小块再合理分组，更容易理解和记忆。"],
        ["认知偏差", "人做判断时会有系统性思维偏差，设计要减少误导。"],
        ["认知负荷", "界面不要让人费脑，降低理解和操作成本。"],
        ["多尔蒂阈值", "交互反馈＜400ms，效率和流畅度会显著提升。"],
        ["费茨定律", "目标越大、距离越近，点击越快越准。"],
        ["心流 (Flow)", "让用户专注沉浸、无干扰，体验最好。"],
        ["目标梯度效应", "越接近完成目标，用户动力越强。"],
        ["希克定律", "选择越多、越复杂，决策时间越长。"],
        ["雅各布定律", "用户习惯其他网站的模式，你的界面要符合通用习惯。"],
        ["共同区域定律", "同一区域内的元素，会被视为一组。"],
        ["接近定律", "挨得近的元素，会被看成一组。"],
        ["简洁定律", "人会自动把复杂图形简化理解。"],
        ["相似定律", "外观相似的元素，会被归为一类。"],
        ["连通性定律", "视觉上相连的元素，关联性更强。"],
        ["心智模型", "设计要符合用户对系统“怎么工作”的已有认知。"],
        ["米勒定律", "人短时记忆大约只能记住 7±2 个项目。"],
        ["奥卡姆剃刀", "能用最简单方案实现，就别搞复杂。"],
        ["活跃用户悖论", "用户不爱看说明，上来就直接用。"],
        ["帕累托原则 (二八定律)", "20% 的功能/原因，带来 80% 的效果/问题。"],
        ["帕金森定律", "任务会自动膨胀，占满你给的所有时间。"],
        ["峰终定律", "人对体验的记忆主要由峰值和结尾决定。"],
        ["波斯特尔定律", "兼容接收的内容，严谨输出自己的内容。"],
        ["选择性注意", "用户只会关注和目标相关的信息，其他会被忽略。"],
        ["序列位置效应", "人最容易记住开头和结尾的内容。"],
        ["特斯勒定律", "系统总有不可消除的复杂度，设计应尽量简化。"],
        ["冯·雷斯托夫效应", "与众不同的那个元素，最容易被记住。"],
        ["工作记忆", "临时处理信息的能力有限，别同时塞太多内容。"],
        ["蔡格尼克效应", "人对未完成的任务，记忆比已完成的更深。"]
    ];

    function pad(n) { return n < 10 ? '0' + n : n; }

    function getFixedDate() {
        var d = new Date();
        var offset = d.getTimezoneOffset(); 
        var utc = d.getTime() + (offset * 60000); 
        var beijingTime = utc + (3600000 * 8); 
        return new Date(beijingTime);
    }

    function refresh() {
        var now = getFixedDate();
        document.getElementById('time').innerHTML = pad(now.getHours()) + ":" + pad(now.getMinutes());
        
        var y = now.getFullYear();
        var mon = now.getMonth();
        var d = now.getDate();

        document.getElementById('ym').innerHTML = y + "年" + (mon + 1) + "月" + d + "日";
        document.getElementById('weather').innerHTML = "上海 · 16°C";

        var totalDays = Math.floor(now.getTime() / (1000 * 60 * 60 * 24));
        var index = totalDays % dataList.length;
        var currentItem = dataList[index];

        document.getElementById('dailyTitle').innerHTML = currentItem[0];
        document.getElementById('dailySub').innerHTML = currentItem[1];

        var body = document.getElementById('calBody');
        body.innerHTML = "";
        var firstDay = new Date(y, mon, 1).getDay();
        var lastDate = new Date(y, mon + 1, 0).getDate();
        var prevLast = new Date(y, mon, 0).getDate();

        var days = [];
        for (var a = firstDay - 1; a >= 0; a--) days.push({ v: prevLast - a, t: 'o' });
        for (var b = 1; b <= lastDate; b++) days.push({ v: b, t: 'c' });
        while (days.length < 35) days.push({ v: days.length - (lastDate + firstDay - 1) + 1, t: 'o' });

        var html = "";
        for (var row = 0; row < 5; row++) {
            html += "<tr>";
            for (var col = 0; col < 7; col++) {
                var item = days[row * 7 + col];
                var className = "";
                if (item.t === 'c' && item.v === d) {
                    className = "today";
                } else if (item.t === 'o') {
                    className = "other-month";
                }
                html += "<td class='" + className + "'>" + Math.abs(item.v) + "</td>";
            }
            html += "</tr>";
        }
        body.innerHTML = html;
    }

    refresh();
    setInterval(refresh, 30000);
</script>
</body>
</html>
